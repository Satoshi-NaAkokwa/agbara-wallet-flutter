<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agbara Wallet — WebAuthn Login</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,sans-serif;background:#0a0a0f;color:#e0e0e0;display:flex;align-items:center;justify-content:center;min-height:100vh}
  .card{background:#14141f;border:1px solid #2a2a3a;border-radius:16px;padding:40px;width:100%;max-width:420px;text-align:center}
  .logo{font-size:32px;font-weight:700;color:#f7931a;margin-bottom:8px}
  .subtitle{color:#888;font-size:14px;margin-bottom:32px}
  .btn{display:block;width:100%;padding:14px 20px;border-radius:10px;border:none;font-size:16px;font-weight:600;cursor:pointer;transition:all .2s;margin-bottom:12px}
  .btn-primary{background:#f7931a;color:#0a0a0f}
  .btn-primary:hover{background:#ffb347}
  .btn-secondary{background:#2a2a3a;color:#e0e0e0}
  .btn-secondary:hover{background:#3a3a4a}
  .status{font-size:13px;color:#888;margin-top:20px;min-height:20px}
  .status.ok{color:#4caf50}
  .status.err{color:#f44336}
  .divider{border-top:1px solid #2a2a3a;margin:24px 0}
  .field{width:100%;padding:12px 14px;background:#0a0a0f;border:1px solid #2a2a3a;border-radius:8px;color:#e0e0e0;font-size:14px;margin-bottom:12px}
  .field:focus{outline:none;border-color:#f7931a}
  .hidden{display:none}
</style>
</head>
<body>
<div class="card">
  <div class="logo">Agbara</div>
  <div class="subtitle">Bitcoin / Liquid Asset Wallet</div>

  <button class="btn btn-primary" id="btnRegister" onclick="register()">Create Passkey</button>
  <button class="btn btn-secondary" id="btnLogin" onclick="login()">Sign In with Passkey</button>

  <div class="divider"></div>

  <input type="text" class="field" id="mnemonicInput" placeholder="Or paste your BIP-39 mnemonic...">
  <button class="btn btn-secondary" onclick="loginWithMnemonic()">Unlock with Mnemonic</button>

  <div class="status" id="status"></div>
</div>

<script>
const API = '/api';
const status = document.getElementById('status');

function setStatus(msg, ok) {
  status.textContent = msg;
  status.className = 'status ' + (ok ? 'ok' : 'err');
}

function bufferToBase64(buf) {
  return btoa(String.fromCharCode(...new Uint8Array(buf))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}

function base64ToBuffer(b64) {
  return Uint8Array.from(atob(b64.replace(/-/g,'+').replace(/_/g,'/') + '='.repeat((4 - b64.length % 4) % 4)), c => c.charCodeAt(0));
}

async function register() {
  try {
    setStatus('Creating passkey...');
    const cred = await navigator.credentials.create({
      publicKey: {
        challenge: crypto.getRandomValues(new Uint8Array(32)),
        rp: { name: 'Agbara Wallet', id: location.hostname },
        user: { id: crypto.getRandomValues(new Uint8Array(16)), name: 'agbara-user', displayName: 'Agbara User' },
        pubKeyCredParams: [{ alg: -7, type: 'public-key' }],
        authenticatorSelection: { userVerification: 'preferred', residentKey: 'preferred' },
        attestation: 'none'
      }
    });

    // Generate fresh mnemonic and store encrypted with credential id as key hint
    const mnemonic = await generateMnemonic();
    localStorage.setItem('agbara_cred_id', cred.id);
    localStorage.setItem('agbara_mnemonic_enc', await encryptMnemonic(mnemonic, cred.id));

    setStatus('Passkey created! Redirecting...', true);
    setTimeout(() => location.href = '/?auth=passkey', 800);
  } catch (e) {
    setStatus('Error: ' + e.message);
  }
}

async function login() {
  try {
    setStatus('Authenticating...');
    const credId = localStorage.getItem('agbara_cred_id');
    const allowCredentials = credId ? [{ id: base64ToBuffer(credId), type: 'public-key' }] : undefined;

    const cred = await navigator.credentials.get({
      publicKey: {
        challenge: crypto.getRandomValues(new Uint8Array(32)),
        rpId: location.hostname,
        allowCredentials,
        userVerification: 'preferred'
      }
    });

    const enc = localStorage.getItem('agbara_mnemonic_enc');
    if (enc) {
      const mnemonic = await decryptMnemonic(enc, cred.id);
      localStorage.setItem('agbara_mnemonic', mnemonic);
    }

    setStatus('Authenticated! Redirecting...', true);
    setTimeout(() => location.href = '/?auth=passkey', 800);
  } catch (e) {
    setStatus('Error: ' + e.message);
  }
}

async function loginWithMnemonic() {
  const m = document.getElementById('mnemonicInput').value.trim();
  if (!m || m.split(' ').length < 12) {
    setStatus('Enter a valid 12+ word BIP-39 mnemonic');
    return;
  }
  localStorage.setItem('agbara_mnemonic', m);
  setStatus('Wallet unlocked. Redirecting...', true);
  setTimeout(() => location.href = '/', 600);
}

// Simple AES-GCM encryption using Web Crypto with credential id as key material
async function encryptMnemonic(mnemonic, credId) {
  const key = await deriveKey(credId);
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const enc = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, new TextEncoder().encode(mnemonic));
  return JSON.stringify({ iv: bufferToBase64(iv), data: bufferToBase64(enc) });
}

async function decryptMnemonic(json, credId) {
  const { iv, data } = JSON.parse(json);
  const key = await deriveKey(credId);
  const dec = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: base64ToBuffer(iv) }, key, base64ToBuffer(data));
  return new TextDecoder().decode(dec);
}

async function deriveKey(credId) {
  const base = await crypto.subtle.importKey('raw', new TextEncoder().encode(credId), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey({ name: 'PBKDF2', salt: new Uint8Array(16), iterations: 100000, hash: 'SHA-256' }, base, { name: 'AES-GCM', length: 256 }, false, ['encrypt', 'decrypt']);
}

async function generateMnemonic() {
  // BIP-39 wordlist (first 12 words as demo — real impl should use full 2048 words)
  const words = ['abandon','ability','able','about','above','absent','absorb','abstract','absurd','abuse','access','accident'];
  const m = [];
  for (let i=0;i<12;i++) m.push(words[Math.floor(Math.random()*words.length)];
  return m.join(' ');
}
</script>
</body>
</html>
