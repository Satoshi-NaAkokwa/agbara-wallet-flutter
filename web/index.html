<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="EJEMMA Wallet — ofo-backed Biafran remittance wallet. Self-custodial ₵ and Liquid assets.">
  <meta name="theme-color" content="#1B5E20">
  <title>EJEMMA Wallet</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body { margin:0; background:#0D3B10; }
    #loading { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; color:white; font-family:sans-serif; }
    .spinner { width:48px; height:48px; border:4px solid rgba(255,255,255,0.3); border-top-color:#C8A415; border-radius:50%; animation:spin 1s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <p style="margin-top:16px; font-weight:bold;">EJEMMA</p>
    <p style="font-size:12px; opacity:0.8;">Loading wallet...</p>
  </div>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      const el = document.getElementById('loading');
      if (el) el.remove();
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
